# netlify.toml

[build]
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Serve ads.txt explicitly before any redirect rules
[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

# Route scam checker API to serverless function
[[redirects]]
  from   = "/api/check-scam"
  to     = "/.netlify/functions/check-scam"
  status = 200

# 404 fallback — must be last
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

[context.production.environment]
  NODE_VERSION = "20"
